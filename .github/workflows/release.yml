name: Package GNOME extension

# Builds the extension zip and attaches it to the GitHub Release whenever
# a release is published.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read extension UUID from metadata.json
        id: meta
        run: |
          UUID=$(jq -r '.uuid' src/metadata.json)
          echo "Extension UUID: $UUID"
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: |
          cd src
          zip -r "../${{ steps.meta.outputs.uuid }}.shell-extension.zip" . -x '.*'

      - name: Attach zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.meta.outputs.uuid }}.shell-extension.zip
